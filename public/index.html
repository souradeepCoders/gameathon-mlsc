<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia | Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #090e17; --surface: rgba(30, 41, 59, 0.75); --text: #e2e8f0;
            --accent: #00f2fe; --admin-accent: #ff007f; --warning: #fbbf24;
            --font-base: clamp(1rem, 1.2vw, 1.15rem); 
            --font-h1: clamp(2.5rem, 5vw, 4rem); 
            --font-h2: clamp(1.3rem, 2vw, 1.8rem);
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, var(--bg), #111827);
            color: var(--text); margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            font-size: var(--font-base); overflow-x: hidden; 
        }
        .cyber-grid {
            position: fixed; bottom: -20vh; left: 0; width: 100vw; height: 60vh;
            background-image: linear-gradient(rgba(0, 242, 254, 0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 254, 0.15) 1px, transparent 1px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(70deg); z-index: -2; animation: moveGrid 3s linear infinite;
        }
        @keyframes moveGrid { 0% { background-position: 0px 0px; } 100% { background-position: 0px 50px; } }
        .glow-orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.4; }
        .orb-1 { top: 10%; left: 20%; width: 300px; height: 300px; background: var(--admin-accent); animation: float 10s ease-in-out infinite alternate; }
        .orb-2 { bottom: 20%; right: 10%; width: 400px; height: 400px; background: var(--accent); animation: float 12s ease-in-out infinite alternate-reverse; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, -50px); } }
        .screen { display: none; flex-direction: column; gap: 2rem; width: 95%; max-width: 1200px; padding: clamp(1rem, 3vw, 2rem); box-sizing: border-box; z-index: 10; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .panel { background: var(--surface); backdrop-filter: blur(12px); padding: clamp(1rem, 2.5vw, 1.5rem); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 40px rgba(0,0,0,0.6); box-sizing: border-box; }
        h1, h2, h3 { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        h1 { font-size: var(--font-h1); text-transform: uppercase; }
        h2 { margin-top: 0; color: var(--accent); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-size: var(--font-h2); }
        .admin-text { color: var(--admin-accent); }
        input, select { width: 100%; padding: clamp(8px, 1.5vw, 12px); margin-bottom: 10px; background: rgba(0,0,0,0.5); border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; font-size: var(--font-base); font-family: 'Rajdhani', sans-serif; font-weight: 600; }
        input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px rgba(0,242,254,0.2); }
        button { width: 100%; padding: clamp(10px, 2vw, 14px); background: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: var(--font-base); transition: all 0.2s; font-family: 'Orbitron', sans-serif; letter-spacing: 1.5px; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4); }
        button.admin-btn { background: var(--admin-accent); color: white; }
        button.admin-btn:hover { box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4); }
        button.danger-btn { background: #ef4444; color: white; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: clamp(1rem, 2vw, 2rem); width: 100%; }
        .player-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .row-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        .player-card { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; }
        .player-card span { display: block; color: #94a3b8; margin-bottom: 4px; word-break: break-all; }
        .leader-badge { font-family: 'Orbitron', sans-serif; color: var(--warning); font-weight: bold; font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px;}
        .match-item { background: rgba(0,0,0,0.4); padding: clamp(8px, 1.5vw, 12px); border-left: 4px solid var(--warning); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 6px 6px 0;}
        .match-setup-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="cyber-grid"></div><div class="glow-orb orb-1"></div><div class="glow-orb orb-2"></div>

    <div id="loginScreen" class="screen active">
        <div class="panel" style="max-width: 400px; margin: 0 auto; text-align: center; width: 100%;">
            <h1 style="color: white; margin-bottom: 30px; border: none; text-shadow: 0 0 15px rgba(0, 242, 254, 0.5);">ARCADIA</h1>
            <input type="text" id="loginId" placeholder="Player ID (or 'admin')">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="handleLogin()" style="margin-top: 10px;">Authenticate</button>
            <p id="loginError" style="color: #ff4757; display: none; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="playerScreen" class="screen">
        <div class="dashboard-grid">
            <div class="panel">
                <h2 style="display: flex; justify-content: space-between; flex-wrap: wrap;">
                    <span>Team: <span id="teamDisplay" style="color: white;"></span></span>
                    <span>Score: <span id="myScore" style="color: white;"></span></span>
                </h2>
                <p style="font-size: 1.1em;"><strong>Team Internal Rankings</strong></p>
                <div id="rosterList" class="player-grid"></div>
                <button onclick="refreshPlayerData()" style="margin-top: 10px; background: transparent; border: 1px solid var(--accent); color: var(--accent);">Refresh My Data</button>
            </div>
            <div class="panel">
                <h2>Global Leaderboard</h2>
                <div id="playerLeaderboard"></div>
            </div>
        </div>
        <button style="background: transparent; color: gray;" onclick="logout()">Disconnect System</button>
    </div>

    <div id="adminScreen" class="screen">
        <h1 class="admin-text" style="text-align: center; margin: 0; text-shadow: 0 0 20px rgba(255,0,127,0.5);">Arcadia Command Center</h1>
        
        <div class="dashboard-grid">
            <div class="panel" style="border-color: var(--warning);">
                <h2 style="color: var(--warning);">Live Match Setup</h2>
                <select id="gameSelect">
                    <optgroup label="PC Arcades (Score Points)">
                        <option value="WWE">WWE</option><option value="FIFA">FIFA</option><option value="TEKKEN">TEKKEN</option><option value="F1">F1</option>
                    </optgroup>
                    <optgroup label="Solo Arcades (High Score = Cash)">
                        <option value="RE 4 Mercenary [CASH PRIZE]">RE 4 Mercenary</option><option value="Doom Horde [CASH PRIZE]">Doom - Horde Mode</option>
                        <option value="Ultrakill [CASH PRIZE]">Ultrakill</option><option value="Subway Surfers [CASH PRIZE]">Subway Surfers</option><option value="Geometry Dash [CASH PRIZE]">Geometry Dash</option>
                    </optgroup>
                    <optgroup label="NO LIFE (Challenges = Cash)">
                        <option value="Hollow Knight Silksong [CHALLENGE]">Hollow Knight Silksong</option><option value="Sekiro [CHALLENGE]">Sekiro</option>
                        <option value="Elden Ring [CHALLENGE]">Elden Ring</option><option value="Baldy's Basics [CHALLENGE]">Baldy's Basics</option>
                    </optgroup>
                    <optgroup label="FUN ZONE (No Points)">
                        <option value="GTA VC [NO POINTS]">GTA VC</option><option value="GTA SA [NO POINTS]">GTA SA</option><option value="GTA 5 [NO POINTS]">GTA 5</option>
                        <option value="RE 9 [NO POINTS]">RE 9</option><option value="RDR [NO POINTS]">RDR</option><option value="DELTARUNE [NO POINTS]">DELTARUNE</option>
                    </optgroup>
                    <optgroup label="Mobile Zone">
                        <option value="Mini Militia">Mini Militia</option><option value="Bloody Bastards">Bloody Bastards</option>
                        <option value="CR Tournament">CR (Tournament)</option><option value="SmashKarts Tournament">SmashKarts (Tournament)</option>
                    </optgroup>
                </select>

                <select id="matchMode" onchange="updateMatchUI()" style="border-color: var(--warning); color: var(--warning);">
                    <option value="1v1">Format: 1 vs 1</option><option value="solo">Format: Solo / Time Attack</option><option value="2v2">Format: 2 vs 2</option><option value="ffa">Format: 4-Player FFA</option>
                </select>

                <div class="row-grid">
                    <div class="match-setup-box" id="teamABox">
                        <strong style="color: white; font-family: 'Orbitron'; font-size: 0.8em; letter-spacing: 1px;">SIDE 1</strong>
                        <select id="player1Select"><option>Loading...</option></select><select id="player2Select" style="display: none;"><option>Loading...</option></select>
                    </div>
                    <div class="match-setup-box" id="teamBBox">
                        <strong style="color: white; font-family: 'Orbitron'; font-size: 0.8em; letter-spacing: 1px;">SIDE 2</strong>
                        <select id="player3Select"><option>Loading...</option></select><select id="player4Select" style="display: none;"><option>Loading...</option></select>
                    </div>
                </div>
                <button class="admin-btn" style="background: var(--warning); color: black; margin-top: 10px;" onclick="startMatch()">Start Match</button>
                <h3 style="color: white; margin-top: 20px; font-family: 'Orbitron', sans-serif;">Matches in Progress</h3>
                <div id="activeMatchesList"></div>
            </div>

            <div class="panel" style="border-color: var(--admin-accent);">
                <h2 class="admin-text">Award Points</h2>
                <select id="scoreTeamSelect" onchange="loadPlayersForScoring()"><option>Select Team First...</option></select>
                <select id="scorePlayerSelect"><option>Waiting for team...</option></select>
                <input type="number" id="pointsToAdd" placeholder="Points to Award">
                <button class="admin-btn" onclick="awardPoints()">Commit Points</button>
                <h2 class="admin-text" style="margin-top: 25px;">Live Rankings</h2>
                <div id="adminLeaderboardList"></div>
            </div>
        </div>

        <div class="panel">
            <h2 class="admin-text">Register New Team</h2>
            <div class="row-grid" style="margin-bottom: 15px;">
                <input type="text" id="regId" placeholder="Team ID (e.g. ALPHA)">
            </div>
            <div class="player-grid">
                <div class="player-card">
                    <strong class="leader-badge">Captain (Player 1)</strong>
                    <input type="text" id="p1Name" placeholder="Name"><input type="email" id="p1Email" placeholder="Email"><input type="text" id="p1Phone" placeholder="Phone">
                </div>
                <div class="player-card">
                    <strong style="color: white; font-size: 0.9em; font-weight: 700;">Player 2</strong>
                    <input type="text" id="p2Name" placeholder="Name"><input type="email" id="p2Email" placeholder="Email"><input type="text" id="p2Phone" placeholder="Phone">
                </div>
                <div class="player-card">
                    <strong style="color: white; font-size: 0.9em; font-weight: 700;">Player 3</strong>
                    <input type="text" id="p3Name" placeholder="Name"><input type="email" id="p3Email" placeholder="Email"><input type="text" id="p3Phone" placeholder="Phone">
                </div>
            </div>
            <button class="admin-btn" onclick="registerTeam()">Register Team & Generate Logins</button>
        </div>
        <button style="background: transparent; color: gray;" onclick="logout()">Close Admin Session</button>
    </div>

    <script>
        let currentLoginId = ''; let currentPassword = ''; let allTeamsData = []; 
        function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        async function handleLogin() {
            currentLoginId = document.getElementById('loginId').value;
            currentPassword = document.getElementById('loginPass').value;
            try {
                const res = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ loginId: currentLoginId, password: currentPassword }) });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('loginError').style.display = 'none';
                    if (data.role === 'admin') { switchScreen('adminScreen'); refreshAdminData(); } 
                    else { renderPlayerDashboard(data.teamData, data.currentPlayer); loadLeaderboard('playerLeaderboard'); switchScreen('playerScreen'); }
                } else {
                    document.getElementById('loginError').innerText = data.error; document.getElementById('loginError').style.display = 'block';
                }
            } catch (err) { document.getElementById('loginError').innerText = "Server error."; document.getElementById('loginError').style.display = 'block'; }
        }

        function logout() { currentLoginId = ''; currentPassword = ''; document.getElementById('loginId').value = ''; document.getElementById('loginPass').value = ''; switchScreen('loginScreen'); }
        async function refreshPlayerData() { handleLogin(); } 

        function renderPlayerDashboard(teamData, currentPlayer) {
            document.getElementById('teamDisplay').innerHTML = `${teamData.teamId} <br><span style="font-size: 0.8em; color: var(--accent);">Welcome, ${currentPlayer.name}</span>`;
            document.getElementById('myScore').innerText = teamData.score;
            const roster = document.getElementById('rosterList'); roster.innerHTML = '';
            const sortedPlayers = [...teamData.players].sort((a, b) => b.points - a.points);
            sortedPlayers.forEach(p => {
                const isMe = p.playerId === currentPlayer.playerId ? 'border: 1px solid var(--accent); box-shadow: 0 0 15px rgba(0,242,254,0.3);' : '';
                roster.innerHTML += `
                    <div class="player-card" style="${isMe}">
                        ${p.role === 'Leader' ? '<div class="leader-badge">Team Leader</div>' : ''}
                        <strong style="color: white; font-size: 1.2em;">${p.name}</strong>
                        <span style="font-size: 1em;">ID: ${p.playerId}</span>
                        <div style="margin-top: 10px; color: var(--accent);">Points: <strong style="font-size: 1.2em;">${p.points}</strong></div>
                    </div>`;
            });
        }

        async function loadLeaderboard(elementId) {
            const res = await fetch('/teams'); const teams = await res.json();
            const list = document.getElementById(elementId); if(!list) return; list.innerHTML = '';
            teams.forEach((t, i) => {
                const playerNames = t.players.map(p => p.name).join(', ');
                list.innerHTML += `<div class="match-item" style="border-left-color: var(--accent);">
                    <div><strong>#${i + 1} ${t.teamId}</strong> <br><small style="color: gray;">${playerNames}</small></div>
                    <strong style="color: var(--accent); font-size: 1.4em; font-family: 'Orbitron', sans-serif;">${t.score}</strong>
                </div>`;
            });
        }

        function updateMatchUI() {
            const mode = document.getElementById('matchMode').value;
            const p2 = document.getElementById('player2Select'); const p4 = document.getElementById('player4Select'); const teamBBox = document.getElementById('teamBBox');
            if (mode === 'solo') { p2.style.display = 'none'; teamBBox.style.display = 'none'; } 
            else if (mode === '1v1') { p2.style.display = 'none'; teamBBox.style.display = 'block'; p4.style.display = 'none'; } 
            else if (mode === '2v2' || mode === 'ffa') { p2.style.display = 'block'; teamBBox.style.display = 'block'; p4.style.display = 'block'; }
        }

        async function refreshAdminData() {
            const res = await fetch('/teams'); allTeamsData = await res.json();
            let allPlayersOptions = '<option value="">-- Select Player --</option>';
            allTeamsData.forEach(team => { team.players.forEach((player, index) => {
                allPlayersOptions += `<option value="${team.teamId}|${index}|${player.name}">${player.name} (${team.teamId})</option>`;
            });});
            document.getElementById('player1Select').innerHTML = allPlayersOptions; document.getElementById('player2Select').innerHTML = allPlayersOptions;
            document.getElementById('player3Select').innerHTML = allPlayersOptions; document.getElementById('player4Select').innerHTML = allPlayersOptions;
            
            const teamOptions = allTeamsData.map(t => `<option value="${t.teamId}">${t.teamId}</option>`).join('');
            document.getElementById('scoreTeamSelect').innerHTML = `<option value="">-- Select Team --</option>` + teamOptions;
            updateMatchUI(); fetchActiveMatches(); loadLeaderboard('adminLeaderboardList');
        }

        async function registerTeam() {
            const data = {
                teamId: document.getElementById('regId').value,
                p1: { name: document.getElementById('p1Name').value, email: document.getElementById('p1Email').value, phone: document.getElementById('p1Phone').value },
                p2: { name: document.getElementById('p2Name').value, email: document.getElementById('p2Email').value, phone: document.getElementById('p2Phone').value },
                p3: { name: document.getElementById('p3Name').value, email: document.getElementById('p3Email').value, phone: document.getElementById('p3Phone').value }
            };
            const res = await fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            const responseData = await res.json();
            
            if (responseData.credentials) {
                let credText = "✅ TEAM REGISTERED!\n\nCOPY THESE LOGIN DETAILS FOR THE PLAYERS:\n\n";
                responseData.credentials.forEach(c => { credText += `${c.name}  ->  ID: ${c.id}  |  Pass: ${c.pass}\n`; });
                alert(credText); console.log(credText);
            } else { alert(responseData.error || responseData.message); }
            
            document.getElementById('regId').value = ''; 
            document.getElementById('p1Name').value = ''; document.getElementById('p1Email').value = ''; document.getElementById('p1Phone').value = '';
            document.getElementById('p2Name').value = ''; document.getElementById('p2Email').value = ''; document.getElementById('p2Phone').value = '';
            document.getElementById('p3Name').value = ''; document.getElementById('p3Email').value = ''; document.getElementById('p3Phone').value = '';
            refreshAdminData(); 
        }

        function getPlayerText(selectId) {
            const val = document.getElementById(selectId).value; if (!val) return null;
            const parts = val.split('|'); return `${parts[2]} (${parts[0]})`; 
        }

        async function startMatch() {
            const mode = document.getElementById('matchMode').value; const gameName = document.getElementById('gameSelect').value;
            let tA = ""; let tB = "";
            if (mode === 'solo') { tA = getPlayerText('player1Select'); tB = "Solo Attempt"; if (!tA) return alert("Select Player 1."); } 
            else if (mode === '1v1') { tA = getPlayerText('player1Select'); tB = getPlayerText('player3Select'); if (!tA || !tB) return alert("Select both players."); } 
            else if (mode === '2v2') { const p1 = getPlayerText('player1Select'); const p2 = getPlayerText('player2Select'); const p3 = getPlayerText('player3Select'); const p4 = getPlayerText('player4Select'); if (!p1 || !p2 || !p3 || !p4) return alert("Select all 4 players."); tA = `${p1} & ${p2}`; tB = `${p3} & ${p4}`; } 
            else if (mode === 'ffa') { const p1 = getPlayerText('player1Select'); const p2 = getPlayerText('player2Select'); const p3 = getPlayerText('player3Select'); const p4 = getPlayerText('player4Select'); if (!p1 || !p2 || !p3 || !p4) return alert("Select all 4 players."); tA = `${p1}, ${p2}`; tB = `${p3}, ${p4}`; }
            await fetch('/start-match', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ gameName: gameName, teamA: tA, teamB: tB }) });
            document.getElementById('player1Select').value = ""; document.getElementById('player2Select').value = ""; document.getElementById('player3Select').value = ""; document.getElementById('player4Select').value = ""; fetchActiveMatches();
        }

        async function fetchActiveMatches() {
            const res = await fetch('/active-matches'); const matches = await res.json();
            const list = document.getElementById('activeMatchesList'); list.innerHTML = matches.length === 0 ? '<p style="color: gray;">No active matches.</p>' : '';
            matches.forEach(m => {
                list.innerHTML += `<div class="match-item"><div style="font-family: 'Rajdhani', sans-serif; font-size: 1.1em;"><strong style="color: var(--warning); font-family: 'Orbitron', sans-serif;">[${m.gameName}]</strong><br>${m.teamA} <br><span style="color: gray; font-weight: bold; font-size: 0.8em;">VS</span><br> ${m.teamB}</div><button class="danger-btn" style="width: auto; padding: 8px 15px; font-size: 0.8em;" onclick="endMatch('${m._id}')">End</button></div>`;
            });
        }

        async function endMatch(matchId) {
            try { await fetch('/end-match', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ matchId }) }); fetchActiveMatches(); } 
            catch (error) { alert("Error connecting to server."); }
        }

        function loadPlayersForScoring() {
            const selectedTeamId = document.getElementById('scoreTeamSelect').value;
            const team = allTeamsData.find(t => t.teamId === selectedTeamId);
            const playerDropdown = document.getElementById('scorePlayerSelect');
            if (!team) { playerDropdown.innerHTML = '<option>Waiting for team...</option>'; return; }
            playerDropdown.innerHTML = team.players.map((p, index) => `<option value="${index}">${p.name} (${p.role})</option>`).join('');
        }

        async function awardPoints() {
            const teamId = document.getElementById('scoreTeamSelect').value; const playerIndex = document.getElementById('scorePlayerSelect').value; const scoreToAdd = parseInt(document.getElementById('pointsToAdd').value);
            if(!teamId || !scoreToAdd) return alert("Please fill out all scoring fields.");
            const res = await fetch('/update-score', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ teamId, playerIndex, scoreToAdd }) });
            alert((await res.json()).message); document.getElementById('pointsToAdd').value = ''; refreshAdminData(); 
        }
    </script>
</body>
</html>
